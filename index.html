<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG to AM XML - Resplace</title>
    <style>
        body { font-family: sans-serif; background: #0f0f13; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #1a1a24; padding: 30px; border-radius: 15px; text-align: center; width: 350px; border: 1px solid #2a2a3a; }
        .drop-zone { border: 2px dashed #ff4a4a; padding: 30px; margin: 20px 0; cursor: pointer; border-radius: 10px; }
        button { background: #ff4a4a; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; display: none; }
        #status { margin-top: 10px; font-size: 13px; color: #888; }
    </style>
</head>
<body>

<div class="box">
    <h3>SVG to Alight Motion</h3>
    <div class="drop-zone" id="dropZone">Klik / Upload SVG</div>
    <input type="file" id="fileInput" style="display:none" accept=".svg">
    <button id="btn">DOWNLOAD XML</button>
    <div id="status"></div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');
    let svgData = "";
    let fname = "Preset";

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if(file) {
            fname = file.name.replace('.svg', '');
            const reader = new FileReader();
            reader.onload = (res) => {
                svgData = res.target.result;
                btn.style.display = 'block';
                status.innerText = "File Siap!";
            };
            reader.readAsText(file);
        }
    };

    btn.onclick = () => {
        const pathMatch = [...svgData.matchAll(/d="([^"]+)"/g)];
        let shapes = "";
        pathMatch.forEach((m, i) => {
            shapes += `<shape id="${2000+i}" label="Layer_${i}" startTime="0" endTime="2000" fillType="color"><transform><location value="540,540,0"/></transform><fillColor value="#ffff4a4a"/><path d="${m[1]}"/></shape>`;
        });

        const xml = `<?xml version='1.0' encoding='UTF-8' ?><scene title="${fname}" width="1080" height="1080" exportWidth="1080" exportHeight="1080" amver="1028417" ffver="106" am="com.alightcreative.motion/5.0" amplatform="android">${shapes}</scene>`;
        
        const blob = new Blob([xml.trim()], {type: 'text/xml'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fname + ".xml";
        a.click();
        status.innerText = "Berhasil diunduh!";
    };
</script>
</body>
</html>
